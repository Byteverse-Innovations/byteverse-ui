type Service {
  id: ID!
  name: String!
  description: String
  price: Float
  category: String
  servicePillar: String
  pricingModel: String
  targetClient: [String!]
  estimatedDuration: String
  showOnMainSite: Boolean
  isActive: Boolean
  createdAt: String
  updatedAt: String
}

type LineItem {
  id: ID!
  title: String
  description: String!
  quantity: Float!
  unitPrice: Float!
  amount: Float!
  serviceId: ID
  subLineItems: [LineItem!]!
}

type TimelineEvent {
  id: ID!
  chartLabel: String!
  description: String
  startDate: String!
  endDate: String!
  lineItemId: ID
  sortOrder: Int
}

type Quote {
  id: ID!
  clientName: String!
  clientEmail: String!
  status: QuoteStatus!
  lineItems: [LineItem!]!
  total: Float!
  token: String
  createdAt: String
  updatedAt: String
  createdBy: String
  timelineEvents: [TimelineEvent!]
  quoteAssetsPrefix: String
  monthlyCostEstimate: String
  quoteSummary: String
}

type Invoice {
  id: ID!
  quoteId: String!
  clientName: String!
  clientEmail: String!
  status: InvoiceStatus!
  lineItems: [LineItem!]!
  total: Float!
  dueDate: String
  paidAt: String
  createdAt: String
  updatedAt: String
  timelineEvents: [TimelineEvent!]
  quoteAssetsPrefix: String
}

enum QuoteStatus {
  DRAFT
  SENT
  ACCEPTED
  DECLINED
}

enum InvoiceStatus {
  PENDING
  PAID
  OVERDUE
}

enum AuditStatus {
  DRAFT
  IN_PROGRESS
  COMPLETED
  ARCHIVED
}

type ContactSubmission {
  id: ID!
  name: String!
  email: String!
  phone: String
  company: String
  subject: String!
  message: String!
  createdAt: String
}

type Query {
  getIndividualItem(id: ID!): Service @aws_api_key
  listAllServices: [Service!]! @aws_api_key
  getQuoteByToken(token: String!): Quote @aws_api_key
  listQuotes: [Quote!]! @aws_cognito_user_pools
  getQuote(id: ID!): Quote @aws_cognito_user_pools
  listInvoices: [Invoice!]! @aws_cognito_user_pools
  getInvoice(id: ID!): Invoice @aws_cognito_user_pools
  listContactSubmissions: [ContactSubmission!]! @aws_cognito_user_pools

  notionIntegrationStatus: NotionIntegrationStatus! @aws_cognito_user_pools
  notionSyncJob(id: ID!): NotionSyncJob @aws_cognito_user_pools
  getQuoteClientPackageDownload(quoteId: ID!): QuoteClientPackageDownload! @aws_cognito_user_pools

  listAuditTemplates: [AuditTemplate!]! @aws_cognito_user_pools
  getAuditTemplate(id: ID!): AuditTemplate @aws_cognito_user_pools
  listAudits: [Audit!]! @aws_cognito_user_pools
  getAudit(id: ID!): Audit @aws_cognito_user_pools
}

input ContactFormInput {
  name: String!
  email: String!
  phone: String
  company: String
  subject: String!
  message: String!
}

type ContactFormResponse {
  success: Boolean!
  message: String!
}

type NotionOAuthUrl @aws_cognito_user_pools {
  url: String!
  state: String!
}

type NotionIntegrationStatus @aws_cognito_user_pools {
  connected: Boolean!
  workspaceName: String
  usesOAuth: Boolean!
  quotePushConfigured: Boolean!
}

type NotionSyncJob @aws_cognito_user_pools {
  jobId: ID!
  tenantId: ID!
  type: String!
  status: String!
  serviceId: ID
  quoteId: ID
  createdAt: String
  updatedAt: String
  errorMessage: String
}

type QuoteClientPackageFile @aws_cognito_user_pools {
  key: String!
  fileName: String!
  contentType: String!
  downloadUrl: String!
}

type QuoteClientPackageDownload @aws_cognito_user_pools {
  quoteId: ID!
  prefix: String!
  files: [QuoteClientPackageFile!]!
  expiresAt: String!
}

type AuditItem @aws_cognito_user_pools {
  id: ID!
  label: String!
  description: String
  referenceUrl: String
  remediation: String
  sortOrder: Int
}

type AuditSection @aws_cognito_user_pools {
  id: ID!
  title: String!
  description: String
  sortOrder: Int
  items: [AuditItem!]!
}

type AuditTemplate @aws_cognito_user_pools {
  id: ID!
  name: String!
  description: String
  category: String
  version: Int
  sections: [AuditSection!]!
  createdAt: String
  updatedAt: String
  createdBy: String
}

type AuditRunItem @aws_cognito_user_pools {
  id: ID!
  label: String!
  description: String
  referenceUrl: String
  remediation: String
  sortOrder: Int
  status: String
  severity: String
  note: String
  evidenceUrl: String
  dueDate: String
  assignee: String
}

type AuditRunSection @aws_cognito_user_pools {
  id: ID!
  title: String!
  description: String
  sortOrder: Int
  items: [AuditRunItem!]!
}

type Audit @aws_cognito_user_pools {
  id: ID!
  title: String!
  target: String!
  clientName: String
  clientEmail: String
  summary: String
  auditor: String
  auditedAt: String
  status: String!
  templateId: String
  templateName: String
  templateVersion: Int
  sections: [AuditRunSection!]!
  createdAt: String
  updatedAt: String
  createdBy: String
}

input AuditItemInput {
  id: ID
  label: String!
  description: String
  referenceUrl: String
  remediation: String
  sortOrder: Int
}

input AuditSectionInput {
  id: ID
  title: String!
  description: String
  sortOrder: Int
  items: [AuditItemInput!]!
}

input CreateAuditTemplateInput {
  name: String!
  description: String
  category: String
  sections: [AuditSectionInput!]!
}

input UpdateAuditTemplateInput {
  name: String
  description: String
  category: String
  sections: [AuditSectionInput!]
}

input AuditRunItemInput {
  id: ID
  label: String!
  description: String
  referenceUrl: String
  remediation: String
  sortOrder: Int
  status: String
  severity: String
  note: String
  evidenceUrl: String
  dueDate: String
  assignee: String
}

input AuditRunSectionInput {
  id: ID
  title: String!
  description: String
  sortOrder: Int
  items: [AuditRunItemInput!]!
}

input CreateAuditInput {
  title: String!
  target: String!
  clientName: String
  clientEmail: String
  summary: String
  auditor: String
  auditedAt: String
  status: AuditStatus
  templateId: String
  templateName: String
  templateVersion: Int
  sections: [AuditRunSectionInput!]
}

input UpdateAuditInput {
  title: String
  target: String
  clientName: String
  clientEmail: String
  summary: String
  auditor: String
  auditedAt: String
  status: AuditStatus
  sections: [AuditRunSectionInput!]
}

input UpdateAuditRunItemInput {
  label: String
  description: String
  referenceUrl: String
  remediation: String
  status: String
  severity: String
  note: String
  evidenceUrl: String
  dueDate: String
  assignee: String
}

input LineItemInput {
  id: ID
  title: String
  description: String!
  quantity: Float!
  unitPrice: Float!
  amount: Float!
  serviceId: ID
  subLineItems: [LineItemInput!]
}

input TimelineEventInput {
  id: ID
  chartLabel: String!
  description: String
  startDate: String!
  endDate: String!
  lineItemId: ID
  sortOrder: Int
}

input CreateQuoteInput {
  clientName: String!
  clientEmail: String!
  status: QuoteStatus!
  lineItems: [LineItemInput!]!
  total: Float!
  timelineEvents: [TimelineEventInput!]
  monthlyCostEstimate: String
  quoteSummary: String
}

input UpdateQuoteInput {
  clientName: String
  clientEmail: String
  status: QuoteStatus
  lineItems: [LineItemInput!]
  total: Float
  timelineEvents: [TimelineEventInput!]
  monthlyCostEstimate: String
  quoteSummary: String
}

input CreateInvoiceInput {
  quoteId: String!
  clientName: String!
  clientEmail: String!
  lineItems: [LineItemInput!]!
  total: Float!
  dueDate: String
}

input UpdateInvoiceInput {
  status: InvoiceStatus
  paidAt: String
}

type Mutation {
  submitContactForm(input: ContactFormInput!): ContactFormResponse! @aws_api_key
  persistContactSubmission(input: ContactFormInput!): ContactSubmission! @aws_api_key
  acceptQuote(id: ID!, token: String!): Quote @aws_api_key
  createQuote(input: CreateQuoteInput!): Quote @aws_cognito_user_pools
  updateQuote(id: ID!, input: UpdateQuoteInput!): Quote @aws_cognito_user_pools
  deleteQuote(id: ID!): Boolean @aws_cognito_user_pools
  generateQuoteClientPackage(quoteId: ID!): Quote @aws_cognito_user_pools
  convertQuoteToInvoice(quoteId: ID!): Invoice @aws_cognito_user_pools
  markInvoicePaid(id: ID!): Invoice @aws_cognito_user_pools
  createService(input: CreateServiceInput!): Service @aws_cognito_user_pools
  updateService(id: ID!, input: UpdateServiceInput!): Service @aws_cognito_user_pools
  deleteService(id: ID!): Boolean @aws_cognito_user_pools

  notionOAuthUrl: NotionOAuthUrl! @aws_cognito_user_pools
  completeNotionOAuth(input: CompleteNotionOAuthInput!): NotionIntegrationStatus! @aws_cognito_user_pools
  queueSyncServicesFromNotion: NotionSyncJob! @aws_cognito_user_pools
  queuePushServiceToNotion(serviceId: ID!): NotionSyncJob! @aws_cognito_user_pools
  queuePushQuoteToNotion(quoteId: ID!): NotionSyncJob! @aws_cognito_user_pools
  queueSyncQuotesToNotion: NotionSyncJob! @aws_cognito_user_pools

  createAuditTemplate(input: CreateAuditTemplateInput!): AuditTemplate! @aws_cognito_user_pools
  updateAuditTemplate(id: ID!, input: UpdateAuditTemplateInput!): AuditTemplate @aws_cognito_user_pools
  deleteAuditTemplate(id: ID!): Boolean @aws_cognito_user_pools
  seedDefaultAuditTemplates: [AuditTemplate!]! @aws_cognito_user_pools

  createAudit(input: CreateAuditInput!): Audit! @aws_cognito_user_pools
  createAuditFromTemplate(templateId: ID!, input: CreateAuditInput!): Audit! @aws_cognito_user_pools
  updateAudit(id: ID!, input: UpdateAuditInput!): Audit @aws_cognito_user_pools
  updateAuditItem(auditId: ID!, sectionId: ID!, itemId: ID!, input: UpdateAuditRunItemInput!): Audit @aws_cognito_user_pools
  setAuditStatus(id: ID!, status: AuditStatus!): Audit @aws_cognito_user_pools
  deleteAudit(id: ID!): Boolean @aws_cognito_user_pools
}

input CreateServiceInput {
  name: String!
  description: String
  price: Float
  category: String
  servicePillar: String
  pricingModel: String
  targetClient: [String!]
  estimatedDuration: String
  showOnMainSite: Boolean
  isActive: Boolean
}

input UpdateServiceInput {
  name: String
  description: String
  price: Float
  category: String
  servicePillar: String
  pricingModel: String
  targetClient: [String!]
  estimatedDuration: String
  showOnMainSite: Boolean
  isActive: Boolean
}

input CompleteNotionOAuthInput {
  code: String!
  state: String!
}

schema {
  query: Query
  mutation: Mutation
}
